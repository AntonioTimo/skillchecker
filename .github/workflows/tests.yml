          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-supplychain should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          # FP witnesses must be EXERCISED: the BARE official Cargo index (no registry+) and a
          # localhost/loopback pip.conf dev mirror must be present in the fixtures and GREEN
          # (round-4 audit: both used to false-positive HI023).
          python3 <<'PY'
          import sys
          lock = open("examples/clean-supplychain/Cargo.lock").read()
          if 'source = "https://github.com/rust-lang/crates.io-index"' not in lock:
              print("::error::clean-supplychain lost the bare official Cargo index witness"); sys.exit(1)
          pip = open("examples/clean-supplychain/pip.conf").read()
          if "localhost" not in pip:
              print("::error::clean-supplychain lost the loopback pip.conf witness"); sys.exit(1)
          cargocfg = open("examples/clean-supplychain/.cargo/config.toml").read()
          if "rust-lang/crates.io-index" not in cargocfg:
              print("::error::clean-supplychain lost the .cargo/config.toml official-index witness"); sys.exit(1)
          print("clean-supplychain: exit 0 (GREEN) ✓ (bare-Cargo-lock + .cargo/config-official + loopback-pip FP witnesses exercised)")
          PY

      - name: evil-mcp must exit 3 (RED) with CR040 (destination reputation)
        run: |
          set +e
          python3 scripts/scan.py examples/evil-mcp/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-mcp should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          required = {"CR040": "bundled MCP/hook destination reputation", "CR032": "bundled hook presence", "HI017": "remote MCP presence"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          # Lock each CR040 destination form by snippet — one form breaking silently
          # while another still fires must not keep CI green.
          cr040 = "\n".join(f["snippet"] for f in findings if f["rule_id"] == "CR040")
          variants = {
              "185.220.101.5": "remote MCP url -> raw public IP (the verdict-flip case)",
              "xn--80ak6aa92e": "remote MCP url -> punycode / IDN homoglyph host",
              "0x08080808": "remote MCP url -> single hex-encoded IP host",
              "2606:4700:4700::1111": "remote MCP url -> public IPv6 literal (bracketed authority)",
              "0x08.0x08.0x08.0x08": "remote MCP url -> dotted-hex encoded IPv4",
              "0250.0.0.1": "remote MCP url -> dotted-octal encoded IPv4",
              "45.83.122.10": "stdio MCP command+args -> public IP in args",
              "93.184.216.34": "hook command -> public IP",
          }
