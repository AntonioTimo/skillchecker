name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# GitHub Actions runners are migrating from Node.js 20 to Node.js 24 in 2026.
# This env opts every JS action into Node 24 mode, removing the deprecation
# warning and ensuring forward compatibility.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  examples:
    name: example skills smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check scan.py
        run: |
          python3 -c "import ast; ast.parse(open('scripts/scan.py').read())"
          python3 -c "import ast; ast.parse(open('scripts/check_docs.py').read())"

      - name: Doc-currency check (the docs MUST reflect the product)
        run: |
          python3 scripts/check_docs.py

      - name: clean-skill must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-skill/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-skill should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::clean-skill: exit 0 (GREEN) ✓"

      - name: evil-skill must exit 3 (RED)
        run: |
          set +e
          python3 scripts/scan.py examples/evil-skill/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-skill should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::evil-skill: exit 3 (RED) ✓"

      - name: evil-skill must produce expected finding categories
        run: |
          python3 scripts/scan.py examples/evil-skill/ > /tmp/out.json 2>&1 || true
          # Check we caught at least one of each major class
          python3 <<'PY'
          import json, sys
          with open("/tmp/out.json") as f:
              data = json.load(f)
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          # Required catches (representative of major attack classes)
          required = {
              "FM005": "Bash(* *) frontmatter",
              "CR006": "~/.ssh access",
              "CR020": "sudo in code",
              "CR026": "exfiltration endpoint",
              "CR028": "anti-user instruction",
              "CR031": "role confusion",
          }
          missing = [(k, v) for k, v in required.items() if k not in rules]
          if missing:
              print("::error::evil-skill missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print(f"All {len(required)} required attack-class catches present.")
          PY

      - name: evil-plugin must exit 3 (RED) with CR032 + CR033
        run: |
          set +e
          python3 scripts/scan.py examples/evil-plugin/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-plugin should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          rules = {f["rule_id"] for f in data["findings"]}
          required = {"CR032": "bundled hooks", "CR033": "stdio MCP server"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          if missing:
              print("::error::evil-plugin missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-plugin: exit 3 (RED), CR032+CR033 present ✓")
          PY

      - name: clean-with-data must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-with-data/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-with-data should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::clean-with-data: exit 0 (GREEN) ✓"

      - name: evil-ast must exit 3 (RED) with AST001 + AST002 + AST003
        run: |
          set +e
          python3 scripts/scan.py examples/evil-ast/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-ast should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          rules = {f["rule_id"] for f in data["findings"]}
          required = {"AST001": "dynamic eval/exec", "AST002": "aliased builtin", "AST003": "subprocess shell=True", "AST006": "dynamic getattr", "AST008": "char-built exec"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          # Lock the star-import form: `from os import *; system(cmd)` must resolve the bare
          # name back to os.system -> AST003 (convergence sweep gap 6).
          ast003 = "\n".join(f["snippet"] for f in data["findings"] if f["rule_id"] == "AST003")
          if "system(cmd)" not in ast003:
              missing.append(("AST003", "from os import * -> bare system(cmd) [star-import snippet]"))
          if "dispatch_fn(cmd)" not in ast003:
              missing.append(("AST003", "global-rebind alias (dispatch_fn=None; global; =os.system) [round-4 audit pass 2]"))
          if "popen(cmd)" not in ast003:
              missing.append(("AST003", "future-rebind: import-use BEFORE a later module rebind [round-4 audit pass 5]"))
          # round-6 sweep form locks — each call must resolve to os.system:
          for sub, why in [("runner(cmd)", "tuple-unpack alias (runner, opts = os.system, {}) [F1]"),
                           ("b(arg)", "NESTED tuple-unpack alias [F3]"),
                           ("f(cmd)", "seq-callable for-target (for f in [os.system]) [R6-2]"),
                           ('getattr(os, "system")(cmd)', "INLINE getattr literal dispatch [C]"),
                           ("mv(cmd)", "bare AnnAssign (no value) is a no-op, preserves the alias [CONFIRM C19]"),
                           ('builtins.getattr(os, "system")(cmd)', "QUALIFIED builtins.getattr head dispatch [R7]"),
                           # round-8 audit — F2 getattr unification (ASSIGNMENT-result path) + F1 no-FN:
                           ("bg(cmd)", "ASSIGNED builtins.getattr result (bg = builtins.getattr(os,'system')) [R8 F2]"),
                           ("ax(cmd)", "ASSIGNED aliased getattr result (ga=getattr; ax=ga(os,'system')) [R8 F2]"),
                           ("run0(cmd)", "post-except alias on the fall-through path (except E as run0) [R8 F1 no-FN]"),
                           ("dst(cmd)", "transitive alias restored after an except handler [R8 F1 no-FN]"),
                           ("hsel(cmd)", "match-capture masking bounded to the case; later alias fires [R8 F1 no-FN]"),
                           ('(g := getattr)(os, "system")(cmd)', "WALRUS-bound getattr as dispatch head [R8 re-sweep]"),
                           ("wfn(cmd)", "ASSIGNED walrus-getattr result (wfn = (g:=getattr)(os,'system')) [R8 re-sweep]"),
                           ("gfn(cmd)", "capture-then-rebind: except as getattr; getattr=B.getattr; gfn=getattr(...) [R8 re-sweep H2]"),
                           ("nwf(cmd)", "NESTED walrus head (h:=(g:=getattr)) recursively unwrapped [R8 re-sweep H3]"),
                           ("mab(cmd)", "getattr base is a bare module alias (import os as omod) [R8 re-sweep]"),
                           ("wr(cmd)", "walrus RHS alias (wr = (x:=os.system)) — _dotted_name unwraps NamedExpr [R8 re-sweep]"),
                           ("wb(cmd)", "walrus getattr base (getattr((m:=os),'system')) [R8 re-sweep]")]:
              if sub not in ast003:
                  missing.append(("AST003", sub + " — " + why))
          if missing:
              print("::error::evil-ast missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-ast: exit 3 (RED), AST001+AST002+AST003 (+star-import) present ✓")
          PY

      - name: clean-ast must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-ast/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-ast should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          # The benign star-import FP guard must be EXERCISED: `from os import *` bringing a
          # NON-dangerous name (getcwd) into scope must stay GREEN (convergence sweep gap 6).
          python3 <<'PY'
          import sys
          src = open("examples/clean-ast/scripts/safe.py").read()
          for w in ("from os import *", "getcwd()", "def handler(system)", "def extract(shutil",
                    "def with_as_reset",          # `with X as runner` resets the alias timeline (round-6 F2)
                    "def seq_benign",             # opaque/benign-literal for-target stays GREEN (round-6 B)
                    "def def_rebind",             # `def runner` resets a prior alias same-scope (round-7)
                    "def shadowed_getattr",       # a shadowed getattr PARAM does not dispatch (round-7)
                    "def dispatch_table"):        # def-reset holds CROSS-scope, global map dropped (CONFIRM r7 FP-1/2)
              if w not in src:
                  print("::error::clean-ast lost the benign star-import / param-shadow witness:", w); sys.exit(1)
          print("clean-ast: exit 0 (GREEN) ✓ (star-import getcwd + bare + DOTTED-head param-shadow + round-6 with-as/seq + round-7 def-reset/getattr exercised)")
          PY

      - name: evil-unicode must exit 3 (RED) with UNI001 + UNI003
        run: |
          set +e
          python3 scripts/scan.py examples/evil-unicode/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-unicode should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          rules = {f["rule_id"] for f in data["findings"]}
          required = {"UNI001": "bidi override", "UNI002": "zero-width", "UNI003": "Unicode Tags block", "UNI004": "homoglyph"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          if missing:
              print("::error::evil-unicode missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-unicode: exit 3 (RED), UNI001+UNI003 present OK")
          PY

      - name: clean-unicode must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-unicode/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-unicode should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::clean-unicode: exit 0 (GREEN) ✓"

      - name: evil-exfil must exit 3 (RED) with CR034 + CR035
        run: |
          set +e
          python3 scripts/scan.py examples/evil-exfil/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-exfil should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          rules = {f["rule_id"] for f in data["findings"]}
          required = {"CR034": "tunneling/OOB host", "CR035": "env dump to network", "HI019": "IP-literal URL", "HI020": "IFS evasion", "HI021": "telegram API", "ME011": "base64 blob"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          if missing:
              print("::error::evil-exfil missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-exfil: exit 3 (RED), CR034+CR035 present OK")
          PY

      - name: clean-exfil must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-exfil/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-exfil should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::clean-exfil: exit 0 (GREEN) ✓"

      - name: evil-bypass must exit 3 (RED) — code-review regression set
        run: |
          set +e
          python3 scripts/scan.py examples/evil-bypass/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-bypass should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          required = {"FM005": "yaml-list Bash(* *)", "CR026": "~~~/inline exfil", "CR029": "bare-modal policy override", "CR036": "process-substitution pipe-to-shell", "CR037": "eval-substitution pipe-to-shell", "CR001": "defensive span must not mask a malicious span"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          # Lock the SAME-LINE case: a negation word ("never mind") used
          # non-defensively on the same line as a malicious span must still fire.
          cr001 = "\n".join(f["snippet"] for f in findings if f["rule_id"] == "CR001").lower()
          if "never mind" not in cr001:
              missing.append(("CR001", "same-line non-defensive negation must still flag [snippet]"))
          if missing:
              print("::error::evil-bypass missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print(f"evil-bypass: exit 3 (RED), all {len(required)} catches + same-line case present OK")
          PY

      - name: evil-evasion must exit 3 (RED) with CR038 + HI022
        run: |
          set +e
          python3 scripts/scan.py examples/evil-evasion/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-evasion should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          required = {"CR038": "cloud-metadata SSRF", "HI022": "IDN/punycode host", "CR001": "fullwidth pipe-to-shell via NFKC", "HI007": "math-styled exec via NFKC", "HI019": "private-masks-public / userinfo IP"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          # Lock specific HI019 variants by snippet — one variant breaking silently
          # while another still fires must not keep CI green.
          hi019 = "\n".join(f["snippet"] for f in findings if f["rule_id"] == "HI019")
          variants = {"HTTP://": "uppercase scheme", "127.0.0.1@8.8.8.8": "multiple-@ real host", "0x08080808": "bare-IP curl target (scheme-less)", "nc 8.8.8.8": "nc target via urllib/ipaddress", "--proxy 8.8.8.8": "host-bearing option value", "--resolve example.com:443:8.8.8.8": "multi-field option (resolve) inner IP", "-sL 8.8.8.8": "boolean flag must not swallow the IP target", "-x8.8.8.8": "attached short host option (-xVALUE)", "[2001:4860:4860::8888]": "bracketed IPv6 in proxy option", "--dns-servers 1.1.1.1,8.8.8.8": "comma-list option value", "root@8.8.8.8": "ssh public-IP host (identity file skipped, host still flags)", "-X POST 8.8.8.8": "method token skipped, IP target still flags"}
          missing += [(k, v + " [HI019 variant snippet]") for k, v in variants.items() if k not in hi019]
          if missing:
              print("::error::evil-evasion missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-evasion: exit 3 (RED), CR038+HI022+NFKC + HI019 variants present OK")
          PY

      - name: clean-evasion must exit 0 (GREEN)
        run: |
          set +e
          python3 scripts/scan.py examples/clean-evasion/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::clean-evasion should exit 0 (GREEN), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          echo "::notice::clean-evasion: exit 0 (GREEN) ✓"

      - name: evil-supplychain must exit 3 (RED) with CR039 + HI023 + ME012
        run: |
          set +e
          python3 scripts/scan.py examples/evil-supplychain/ > /tmp/out.json 2>&1
          rc=$?
          set -e
          if [ "$rc" -ne 3 ]; then
            echo "::error::evil-supplychain should exit 3 (RED), got $rc"
            cat /tmp/out.json
            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          required = {"CR039": "npm install-lifecycle script", "HI023": "non-registry source", "ME012": "unpinned dependency"}
          missing = [(k, v) for k, v in required.items() if k not in rules]
          # Lock specific HI023 variants by snippet — one form breaking silently
          # while another still fires must not keep CI green.
          hi023 = "\n".join(f["snippet"] for f in findings if f["rule_id"] == "HI023")
          variants = {"git+https://github.com/attacker/evil.git": "npm git+ source", "attacker/leftpad": "npm bare user/repo shorthand", "https://attacker.test/art-1.0.0.tgz": "npm off-registry tarball URL", "evil-helper @ git+https": "pip git+ direct reference", "https://malware.example.com/payload-1.0.tar.gz": "pip bare off-registry tarball", "http://packages.attacker.test": "pip non-TLS http source", "--extra-index-url https://pypi.attacker.test": "pip index redirect", "art @ https://attacker.test/art-1.0-py3-none-any.whl": "pyproject off-registry wheel", "resolved \"https://attacker.test": "lockfile resolved off-registry", "git = \"https://github.com/attacker/evil-crate\"": "cargo Cargo.toml dep git source ([package] metadata skipped)", "-e git+https://github.com/attacker/editable.git": "pip -e editable remote", "git+ssh://git@github.com/attacker/ssh-dep.git": "pip PEP508 git+ssh direct ref", "--extra-index-url=https://pypi-equals.attacker.test": "pip --opt=value equals form", "tool @ git+https://github.com/attacker/tool.git": "pyproject optional-dependencies array element", "replace github.com/safe/pkg => github.com/attacker/pkg": "go.mod replace => remote module", "source = \"git+https://github.com/attacker/evil-crate": "Cargo.lock [[package]] git source (registry+ sibling stays green)", "registry+https://altreg.attacker.test": "Cargo.lock alternate-registry off-host (official index stays green)", "registry+https://github.com/attacker/rust-lang/crates.io-index": "Cargo.lock GitHub path-spoof (exact official path required)", "--find-links https://links.attacker.test": "pip --find-links source redirect", "https://poetry.attacker.test/simple/": "poetry [[tool.poetry.source]] custom source redirect", 'registry "https://evil-registry.attacker.test': ".yarnrc classic index redirect (convergence gap 7)", 'npmRegistryServer: "https://evil-registry.attacker.test': ".yarnrc.yml berry index redirect (gap 7)", "index-url = https://evil-registry.attacker.test": "pip.conf index-url redirect (round 4)", 'registry = "https://evil-registry.attacker.test/git/index"': "cargo .cargo/config.toml source redirect (round 4)", "- https://evil-registry.attacker.test": ".gemrc source redirect (round 4)", "uv.attacker.test": "pyproject [[tool.uv.index]] redirect (round-4 re-verify)", "pdm.attacker.test": "pyproject [[tool.pdm.source]] redirect (round-4 re-verify)"}
          missing += [(k, v + " [HI023 variant snippet]") for k, v in variants.items() if k not in hi023]
          # CR039 must catch BOTH preinstall and postinstall.
          cr039 = "\n".join(f["snippet"] for f in findings if f["rule_id"] == "CR039")
          for k in ("scripts.preinstall", "scripts.postinstall"):
              if k not in cr039:
                  missing.append(("CR039", k + " [lifecycle script snippet]"))
          # ME012 must fire once per top-level manifest, never on the lock.
          me012_files = {f["file"] for f in findings if f["rule_id"] == "ME012"}
          for k in ("package.json", "pyproject.toml", "requirements.txt"):
              if k not in me012_files:
                  missing.append(("ME012", k + " [per-manifest aggregate]"))
          # Recursive discovery (Codex r3): a manifest nested in vendor/node_modules must
          # be found, not just root-level ones (the old 3-subdir allowlist missed it).
          cr039_files = {f["file"] for f in findings if f["rule_id"] == "CR039"}
          if not any("node_modules" in f for f in cr039_files):
              missing.append(("CR039", "nested vendor/node_modules manifest must be discovered recursively"))
          if missing:
              print("::error::evil-supplychain missing expected catches:")
              for rule, why in missing:
                  print(f"  - {rule} ({why})")
              sys.exit(1)
          print("evil-supplychain: exit 3 (RED), CR039+HI023+ME012 + variants present OK")
          PY

      - name: clean-supplychain must exit 0 (GREEN)
        run: |
