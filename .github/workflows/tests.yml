            exit 1
          fi
          python3 <<'PY'
          import json, sys
          data = json.load(open("/tmp/out.json"))
          findings = data["findings"]
          rules = {f["rule_id"] for f in findings}
          missing = []
          for r in ("CR041", "HI026", "AST010", "AST011", "CR042", "HI027", "CR043", "HI028", "CR044", "HI029"):
              if r not in rules:
                  missing.append((r, "absent"))
          def snip(rid):
              return "\n".join(f["snippet"] for f in findings if f["rule_id"] == rid)
          locks = [
              ("CR041", "<|im_start|>"),                  # forged chat-template turn
              ("HI026", "disregard all previous instructions"),
              ("AST010", "os.execv"),                     # process replacement
              ("AST011", "extractall"),                   # Zip-Slip
              ("AST011", "fully_trusted"),                # unsafe filter VALUE: presence of filter= is not safety (Codex)
              ("AST011", "getmembers"),                   # members=getmembers() passes ALL members — not safety (Codex)
              ("CR042", "leaky-stdio.env"),               # live token in env
              ("CR042", "leaky-remote.headers"),          # live token in header
              ("HI027", ".aws/credentials"),              # credential-file ref in env
              ("CR043", "<!("),                           # gyp command-substitution
              ("HI028", "binding.gyp"),                   # native-addon manifest presence
              ("CR044", "/dev/tcp/"),                     # reverse shell
              ("HI029", "transfer.sh"),                   # staging download host
              # adversarial-review regression locks:
              ("HI026", "instructions above"),            # noun-before-prior-ref order
              ("HI029", "uguu.se"),                       # sibling staging host
              ("CR042", "stripe-leak"),                   # Stripe sk_live_ token shape
              ("CR042", "aws-leak"),                      # AKIA key (placeholder dead-code fix)
              ("AST010", "spawnv"),                       # os.spawn* program-index fix
          ]
          for r, sub in locks:
              if sub not in snip(r):
                  missing.append((r, f"snippet substring '{sub}' [form lock]"))
          # AST011 must fire on all three unsafe forms (no-filter + fully_trusted + getmembers).
