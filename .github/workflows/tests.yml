              missing.append(("AST011", "expected >=3 unsafe-extract forms (no-filter, fully_trusted, getmembers)"))
          # AST010 must carry BOTH a CRITICAL (non-literal program) and a HIGH (literal).
          ast10 = {f["severity"] for f in findings if f["rule_id"] == "AST010"}
          if not {"CRITICAL", "HIGH"} <= ast10:
              missing.append(("AST010", f"want both CRITICAL+HIGH severities, got {sorted(ast10)}"))
          # INV001 on the bundled ELF must be CRITICAL (magic-byte escalation), not HIGH
          inv = [f for f in findings if f["rule_id"] == "INV001"]
          if not any(f["severity"] == "CRITICAL" and "ELF" in f["snippet"] for f in inv):
