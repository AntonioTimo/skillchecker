          # NOT carry CR042/HI027 (a token-shaped dummy is not a live secret).
          secrets = "\n".join(f["snippet"] for f in findings if f["rule_id"] in ("CR042", "HI027"))
          for benign in ("clean-placeholder", "dummy-fill"):
              if benign in secrets:
                  missing.append(("CR042/HI027", benign + " (placeholder/dummy) must NOT fire"))
